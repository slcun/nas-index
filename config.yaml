# NAS 服务管理面板 — 配置文件

services:
  # 家庭娱乐
  - name: jellyfin.service
    display_name: Jellyfin
    description: 媒体服务器
    port: 8096
    web: true
    tags: [媒体, 流媒体]
    group: 家庭娱乐

  - name: sonarr.service
    display_name: Sonarr
    description: 电视节目管理
    port: 8989
    web: true
    tags: [媒体, PVR]
    group: 家庭娱乐

  - name: radarr.service
    display_name: Radarr
    description: 电影管理
    port: 7878
    web: true
    tags: [媒体, PVR]
    group: 家庭娱乐

  - name: immich.service
    display_name: Immich
    description: 照片管理
    port: 2283
    path: /photos
    web: true
    tags: [媒体, 照片]
    group: 家庭娱乐

  - name: prowlarr.service
    display_name: Prowlarr
    description: 索引器管理
    port: 9696
    web: true
    tags: [媒体, 索引]
    group: 家庭娱乐

  # 下载管理
  - name: qbittorrent.service
    display_name: qBittorrent
    description: BT 下载工具
    port: 8080
    web: true
    tags: [下载, BT]
    group: 下载管理

  - name: transmission.service
    display_name: Transmission
    description: BT 下载工具
    port: 9091
    web: true
    tags: [下载, BT]
    group: 下载管理

  # 系统工具
  - name: cockpit.service
    display_name: Cockpit
    description: Web 系统管理
    port: 9090
    web: true
    tags: [系统, 管理]

  - name: docker.service
    display_name: Docker
    description: 容器引擎
    web: false
    tags: [系统, 容器]

  # 文件管理
  - name: nginx.service
    display_name: 文件管理器
    description: Web 文件管理
    port: 5001
    path: /file
    web: true
    tags: [文件, Web]

  # 备份与同步
  - name: syncthing.service
    display_name: Syncthing
    description: 文件同步
    port: 8384
    web: true
    tags: [同步, 备份]

# 从列表中排除的系统服务（不显示在面板上）
exclude_services:
  - accounts-daemon.service
  - acpid.service
  - anacron.service
  - apparmor.service
  - avahi-daemon.service
  - bluetooth.service
  - colord.service
  - console-setup.service
  - cron.service
  - cups.service
  - cups-browsed.service
  - dbus.service
  - dnsmasq.service
  - e2scrub_reap.service
  - fstrim.service
  - getty@.service
  - glib-packagekit.service
  - gpu-manager.service
  - grub-common.service
  - hddtemp.service
  - hwclock.service
  - irqbalance.service
  - keyboard-setup.service
  - kmod.service
  - lm-sensors.service
  - lvm2-*.service
  - mdadm.service
  - networking.service
  - NetworkManager.service
  - nfs-*.service
  - ntp.service
  - packagekit.service
  - polkit.service
  - postfix.service
  - pppd-dns.service
  - rpcbind.service
  - rsync.service
  - rsyslog.service
  - smartd.service
  - smartmontools.service
  - smbd.service
  - ssh.service
  - sssd.service
  - sysstat.service
  - systemd-*.service
  - thermald.service
  - ufw.service
  - unattended-upgrades.service
  - uuidd.service
  - whoopsie.service
