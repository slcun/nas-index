# NAS 服务管理面板 — 配置文件

services:
  # 媒体中心
  - name: jellyfin.service
    display_name: Jellyfin
    description: 媒体服务器
    port: 8096
    category: media
    web: true

  - name: sonarr.service
    display_name: Sonarr
    description: 电视节目管理
    port: 8989
    category: media
    web: true

  - name: radarr.service
    display_name: Radarr
    description: 电影管理
    port: 7878
    category: media
    web: true

  - name: immich.service
    display_name: Immich
    description: 照片管理
    port: 2283
    path: /photos
    category: media
    web: true

  # 文件管理
  - name: nginx.service
    display_name: 文件管理器
    description: Web 文件管理
    port: 5001
    path: /file
    category: files
    web: true

  # 下载工具
  - name: qbittorrent.service
    display_name: qBittorrent
    description: BT 下载工具
    port: 8080
    category: download
    web: true

  - name: transmission.service
    display_name: Transmission
    description: BT 下载工具
    port: 9091
    category: download
    web: true

  # 系统工具
  - name: cockpit.service
    display_name: Cockpit
    description: Web 系统管理
    port: 9090
    category: system
    web: true

  - name: docker.service
    display_name: Docker
    description: 容器引擎
    category: system
    web: false

  # 备份与同步
  - name: syncthing.service
    display_name: Syncthing
    description: 文件同步
    port: 8384
    category: backup
    web: true

  # 其他
  - name: prowlarr.service
    display_name: Prowlarr
    description: 索引器管理
    port: 9696
    category: other
    web: true

# 从列表中排除的系统服务（不显示在面板上）
exclude_services:
  - accounts-daemon.service
  - acpid.service
  - anacron.service
  - apparmor.service
  - avahi-daemon.service
  - bluetooth.service
  - colord.service
  - console-setup.service
  - cron.service
  - cups.service
  - cups-browsed.service
  - dbus.service
  - dnsmasq.service
  - e2scrub_reap.service
  - fstrim.service
  - getty@.service
  - glib-packagekit.service
  - gpu-manager.service
  - grub-common.service
  - hddtemp.service
  - hwclock.service
  - irqbalance.service
  - keyboard-setup.service
  - kmod.service
  - lm-sensors.service
  - lvm2-*.service
  - mdadm.service
  - networking.service
  - NetworkManager.service
  - nfs-*.service
  - ntp.service
  - packagekit.service
  - polkit.service
  - postfix.service
  - pppd-dns.service
  - rpcbind.service
  - rsync.service
  - rsyslog.service
  - smartd.service
  - smartmontools.service
  - smbd.service
  - ssh.service
  - sssd.service
  - sysstat.service
  - systemd-*.service
  - thermald.service
  - ufw.service
  - unattended-upgrades.service
  - uuidd.service
  - whoopsie.service

# 服务分类显示
categories:
  media: 媒体中心
  files: 文件管理
  download: 下载工具
  system: 系统工具
  backup: 备份与同步
  tools: 效率与工具
  other: 其他
